<nav class="navbar navbar-expand-lg bg-blue-dark py-3">
    <div class="container">
        <a
            class="navbar-brand text-white fw-bold d-flex align-items-center"
            routerLink="/"
        >
            <i class="bi bi-trophy-fill fs-4 text-warning"></i>
            <span>DIBUTICK</span>
        </a>
        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Abrir menú de navegación"
        >
            <span class="navbar-toggler-icon"></span>
        </button>
        <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
        >
            <ul class="navbar-nav align-items-lg-center mt-3 mt-lg-0">

                <li class="nav-item">
                    <a
                        class="nav-link"
                        routerLink="/"
                        routerLinkActive="active"
                        [routerLinkActiveOptions]="{ exact: true }"
                    >
                        <i class="bi bi-calendar-event d-lg-none me-2"></i>
                        EVENTOS
                    </a>
                </li>
                <ng-container *ngIf="!usuario">

                    <li class="nav-item">
                        <a
                            class="nav-link"
                            routerLink="/login"
                            routerLinkActive="active"
                        >
                            <i class="bi bi-box-arrow-in-right d-lg-none me-2"></i>
                            INICIAR SESIÓN
                        </a>
                    </li>

                    <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                        <a
                            class="btn btn-green btn-sm navbar-action-button"
                            routerLink="/registro"
                        >
                            <i class="bi bi-person-plus me-1"></i>
                            REGISTRARSE
                        </a>
                    </li>

                </ng-container>
                <ng-container *ngIf="usuario">

                    <li class="nav-item">
                        <a
                            class="nav-link user-link"
                            routerLink="/Perfil"
                            routerLinkActive="active"
                        >
                            <i class="bi bi-person-circle me-1"></i>
                            {{ usuario?.nombre }}
                        </a>
                    </li>

                    <li
                        class="nav-item ms-lg-3 mt-2 mt-lg-0"
                        *ngIf="authService.esAdmin()"
                    >
                        <a
                            routerLink="/Admin"
                            class="btn btn-green btn-sm navbar-action-button"
                        >
                            <i class="bi bi-speedometer2 me-1"></i>
                            PANEL ADMIN
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                        <button
                            type="button"
                            class="btn btn-outline-light btn-sm navbar-action-button"
                            (click)="cerrarSesion()"
                        >
                            <i class="bi bi-box-arrow-right me-1"></i>
                            Cerrar sesión
                        </button>
                    </li>
                </ng-container>
            </ul>
        </div>
    </div>
</nav>
