<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-5">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
          <h3 class="fw-bold mb-3">Iniciar sesión</h3>

          <div *ngIf="errorMensaje" class="alert alert-danger">
            {{ errorMensaje }}
          </div>

          <form [formGroup]="formLogin" (ngSubmit)="login()">

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" formControlName="email">

              <small class="text-danger"
                     *ngIf="formLogin.get('email')?.touched && formLogin.get('email')?.invalid">
                Ingresá un email válido.
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" formControlName="password">

              <small class="text-danger"
                     *ngIf="formLogin.get('password')?.touched && formLogin.get('password')?.invalid">
                La contraseña es obligatoria.
              </small>
            </div>

            <button class="btn btn-green w-100" type="submit">
              Ingresar
            </button>

            <div class="text-center mt-3">
              <a routerLink="/registro">Crear cuenta</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</main>
