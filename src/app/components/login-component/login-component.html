<div class="main-wrapper container-fluid">
  <div class="login-container">

    <div class="login-header">
      <i class="bi bi-trophy trophy-icon"></i>
      <h2>DIBUTICK</h2>
      <p>Accede a tu cuenta</p>
    </div>

    <div class="login-card">

      <div class="login-tabs">
        <button
          type="button"
          class="login-tab"
          [class.active]="modo === 'login'"
          (click)="cambiarModo('login')">
          INICIAR SESIÓN
        </button>

        <button
          type="button"
          class="login-tab"
          [class.active]="modo === 'registro'"
          (click)="cambiarModo('registro')">
          REGISTRARSE
        </button>
      </div>

      <div class="login-body">

        <div
          id="googleButton"
          class="google-button-container d-flex justify-content-center">
        </div>

        <div class="divider">
          <span>o con email</span>
        </div>

        <div
          *ngIf="errorMensaje"
          class="alert alert-danger">
          {{ errorMensaje }}
        </div>

        <div *ngIf="modo === 'login'">

          <form
            [formGroup]="formLogin"
            (ngSubmit)="login()">

            <div class="mb-3">
              <label class="form-label">
                Correo electrónico
              </label>

              <input
                type="email"
                class="form-control"
                placeholder="carlos@ejemplo.com"
                formControlName="email">
            </div>

            <div class="mb-2">
              <label class="form-label">
                Contraseña
              </label>

              <input
                type="password"
                class="form-control"
                placeholder="••••••••"
                formControlName="password">
            </div>

            <div class="text-end mb-4">
              <a
                role="button"
                class="forgot-link">
                ¿Olvidaste tu contraseña?
              </a>
            </div>

            <button
              type="submit"
              class="btn-submit">
              Iniciar Sesión
            </button>

          </form>

        </div>

        <div *ngIf="modo === 'registro'">

          <form
            [formGroup]="formRegistro"
            (ngSubmit)="registrar()">

            <div class="row g-3">

              <div class="col-12 col-sm-6">
                <label class="form-label">
                  Nombre
                </label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="Carlos"
                  formControlName="nombre">
              </div>

              <div class="col-12 col-sm-6">
                <label class="form-label">
                  Apellido
                </label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="García"
                  formControlName="apellido">
              </div>

              <div class="col-12">
                <label class="form-label">
                  DNI
                </label>

                <input
                  type="text"
                  inputmode="numeric"
                  class="form-control"
                  placeholder="12345678"
                  formControlName="dni">
              </div>

              <div class="col-12">
                <label class="form-label">
                  Correo electrónico
                </label>

                <input
                  type="email"
                  class="form-control"
                  placeholder="carlos@ejemplo.com"
                  formControlName="email">
              </div>

              <div class="col-12">
                <label class="form-label">
                  Teléfono
                </label>

                <input
                  type="tel"
                  inputmode="tel"
                  class="form-control"
                  placeholder="3881234567"
                  formControlName="telefono">
              </div>

              <div class="col-12">
                <label class="form-label">
                  Contraseña
                </label>

                <input
                  type="password"
                  class="form-control"
                  placeholder="••••••••"
                  formControlName="password">
              </div>

              <div class="col-12">
                <label class="form-label">
                  Confirmar contraseña
                </label>

                <input
                  type="password"
                  class="form-control"
                  placeholder="••••••••"
                  formControlName="confirmarPassword">
              </div>

            </div>

            <button
              type="submit"
              class="btn-submit mt-4">
              Crear Cuenta
            </button>

            <p class="terms-text">
              Al registrarte, aceptas nuestros
              <a href="#">Términos de Servicio</a>
              y
              <a href="#">Política de Privacidad</a>.
            </p>

          </form>

        </div>

      </div>
    </div>

    <div
      class="register-text text-center"
      *ngIf="modo === 'login'">
      ¿No tienes cuenta?
      <a
        role="button"
        (click)="cambiarModo('registro')">
        Regístrate
      </a>
    </div>

    <div
      class="register-text text-center"
      *ngIf="modo === 'registro'">
      ¿Ya tienes cuenta?
      <a
        role="button"
        (click)="cambiarModo('login')">
        Inicia Sesión
      </a>
    </div>

  </div>
</div>
